services:

  db:
    image: postgres:16-alpine
    container_name: flickrx_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: flickrx
      POSTGRES_PASSWORD: flickrx123
      POSTGRES_DB: flickrx_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flickrx"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flickrx_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flickrx_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flickrx_celery
    restart: unless-stopped
    command: celery -A config.celery worker --loglevel=info
    env_file:
      - ./backend/.env
    volumes:
      - media_files:/app/media
    depends_on:
      - redis
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flickrx_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_files:
